<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Configure Unsloth WebUI</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        h1 {
            color: #a5b4fc;
            margin-bottom: 30px;
        }
        .info {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #6366f1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #818cf8;
        }
        button {
            background: #6366f1;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        button:hover {
            background: #4f52e6;
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #818cf8;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background: #10b98122;
            border: 1px solid #10b981;
            color: #86efac;
        }
        .error {
            background: #ef444422;
            border: 1px solid #ef4444;
            color: #fca5a5;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #334155;
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .button-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Unsloth WebUI Configuration</h1>
        
        <div class="info" id="currentDir">
            <strong>Current working directory:</strong><br>
            {{ working_dir or 'Not configured' }}
        </div>
        
        <label for="working_dir">Working Directory:</label>
        <input type="text" id="working_dir" placeholder="/path/to/your/workspace" value="{{ working_dir or '' }}">
        
        <button onclick="saveConfig()" id="saveBtn">
            <span class="button-content">
                <span>Save Configuration</span>
            </span>
        </button>
        
        <div id="message" class="message"></div>
        
        <div style="margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
            <h2 style="color: #a5b4fc; font-size: 1.2em; margin-bottom: 15px;">🛠️ System Prerequisites (GGUF Export)</h2>
            <div id="depsList" style="background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                <div style="text-align: center; color: #94a3b8;">Checking dependencies...</div>
            </div>

            <div id="installBox" style="display: none; margin-top: 15px; background: #fbbf2411; border: 1px solid #fbbf2444; padding: 15px; border-radius: 8px;">
                <p style="color: #fbbf24; font-size: 0.9em; margin-bottom: 10px;">
                    Some tools are missing. Run this command in your terminal to install them:
                </p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="installCmd" readonly value="sudo apt-get update && sudo apt-get install -y build-essential cmake libcurl4-openssl-dev git"
                           style="margin-bottom: 0; font-family: monospace; font-size: 13px; background: #1e293b; color: #fbbf24;">
                    <button onclick="copyInstallCmd()" style="width: auto; padding: 0 15px; background: #475569; font-size: 14px;">Copy</button>
                </div>
            </div>
        </div>

        <a href="/" class="back-link">← Back to WebUI</a>
    </div>
    
    <script>
        const socket = io();

        // Check dependencies
        function checkDeps() {
            const depsList = document.getElementById('depsList');
            const installBox = document.getElementById('installBox');

            fetch('/api/check_deps')
                .then(r => r.json())
                .then(deps => {
                    let html = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">';
                    let anyMissing = false;

                    for (const [name, installed] of Object.entries(deps)) {
                        html += `
                            <div style="display: flex; align-items: center; gap: 8px; font-size: 0.9em;">
                                <span>${installed ? '✅' : '❌'}</span>
                                <span style="color: ${installed ? '#86efac' : '#fca5a5'};">${name}</span>
                            </div>
                        `;
                        if (!installed) anyMissing = true;
                    }

                    html += '</div>';
                    depsList.innerHTML = html;
                    if (anyMissing) installBox.style.display = 'block';
                })
                .catch(err => {
                    depsList.innerHTML = '<div style="color: #ef4444;">Error checking dependencies</div>';
                });
        }

        function copyInstallCmd() {
            const cmd = document.getElementById('installCmd');
            cmd.select();
            document.execCommand('copy');
            alert('Command copied to clipboard! Run it in your terminal.');
        }

        checkDeps();
        
        socket.on('connect', function() {
            console.log('✅ Connected to server with ID:', socket.id);
        });
        
        socket.on('config_saved', function(data) {
            showMessage('Configuration saved! Working directory: ' + data.working_dir, 'success');
            document.getElementById('currentDir').innerHTML = 
                '<strong>Current working directory:</strong><br>' + data.working_dir;
            
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<span class="button-content"><span>Save Configuration</span></span>';
            btn.disabled = false;
            
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        });
        
        socket.on('config_error', function(data) {
            showMessage('Error: ' + data.message, 'error');
            
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<span class="button-content"><span>Save Configuration</span></span>';
            btn.disabled = false;
        });
        
        function saveConfig() {
            const workingDir = document.getElementById('working_dir').value.trim();
            
            if (!workingDir) {
                showMessage('Please enter a directory path', 'error');
                return;
            }
            
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<span class="button-content"><span class="loading"></span><span>Saving...</span></span>';
            btn.disabled = true;
            
            document.getElementById('message').style.display = 'none';
            
            socket.emit('set_working_dir', { working_dir: workingDir });
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }
        
        document.getElementById('working_dir').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                saveConfig();
            }
        });
    </script>
</body>
</html>
